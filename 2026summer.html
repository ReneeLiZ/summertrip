<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>2026 夏季 旅行✈️ 🇯🇵 </title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --border: 2px solid #000000;
      --track: rgba(0, 0, 0, 0.05);
      --glass-bg: rgba(255, 255, 255, 0.78);
      --glass-edge: rgba(255, 255, 255, 0.55);
      --glass-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
      --app-chrome-h: 148px;
    }

    * { box-sizing: border-box; }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      background: #dfe4e8;
      color: var(--fg);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.55;
      letter-spacing: 0.04em;
      overflow-x: hidden;
    }

    .map-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #e8e8e8;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .map-fallback-msg {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.92);
      z-index: 2;
      letter-spacing: 0.08em;
    }

    .map-fallback-msg.visible { display: flex; }

    .ui-layer {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      pointer-events: none;
    }

    .site-header.glass-card,
    .map-panels,
    .handbook-stack {
      pointer-events: auto;
    }

    .site-footer {
      pointer-events: none;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: saturate(150%) blur(16px);
      -webkit-backdrop-filter: saturate(150%) blur(16px);
      border: 1px solid var(--glass-edge);
      box-shadow: var(--glass-shadow);
      border-radius: 5px;
      padding: 0.95rem 1.05rem;
    }

    .site-header.glass-card {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      margin: 10px 12px 0;
      padding: 0.85rem 1.15rem;
      border-radius: 16px;
      pointer-events: auto;
    }

    h1 {
      font-family: "Libre Baskerville", Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.2rem, 3.2vw, 1.65rem);
      margin: 0 0 0.2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .tagline {
      margin: 0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.72;
    }

    .site-header .cloud-status {
      margin: 0.4rem 0 0;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.68;
      line-height: 1.35;
    }

    .site-header .cloud-status.cloud-on {
      opacity: 0.88;
    }

    .map-panels {
      position: fixed;
      top: var(--app-chrome-h, 148px);
      left: 12px;
      width: min(336px, calc(100vw - 24px));
      max-height: calc(100vh - 100px);
      overflow-x: hidden;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
      -webkit-overflow-scrolling: touch;
    }

    .handbook-stack {
      position: fixed;
      top: var(--app-chrome-h, 148px);
      right: 12px;
      width: min(404px, calc(100vw - 24px));
      max-height: calc(100vh - 100px);
      overflow-x: hidden;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
      -webkit-overflow-scrolling: touch;
    }

    @media (max-width: 820px) {
      .map-panels {
        max-height: min(38vh, 320px);
        width: min(300px, calc(100vw - 20px));
      }

      .handbook-stack {
        top: auto;
        bottom: 10px;
        right: 10px;
        left: 10px;
        width: auto;
        max-height: min(42vh, 380px);
      }

      .site-header.glass-card {
        margin: 8px 8px 0;
        padding: 0.65rem 0.85rem;
      }
    }

    @media (max-width: 520px) {
      .map-panels {
        left: 8px;
        max-height: 34vh;
      }
    }

    .map-panels .glass-card h2,
    .handbook-stack .glass-card h2 {
      border-bottom: 1px solid rgba(0, 0, 0, 0.12);
    }

    .site-footer {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      text-align: center;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(0, 0, 0, 0.5);
      text-shadow: 0 0 12px #fff, 0 0 20px rgba(255, 255, 255, 0.9);
      max-width: 90vw;
    }

    .icon-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0.15rem 0.25rem;
      font-size: 0.95rem;
      line-height: 1;
      opacity: 0.75;
    }

    .icon-btn:hover { opacity: 1; }

    .pin-row {
      cursor: pointer;
    }

    .pin-row.is-active {
      background: rgba(0, 0, 0, 0.06);
    }

    .pin-row .pin-time {
      font-size: 0.65rem;
      font-weight: 700;
      opacity: 0.75;
      margin-bottom: 0.1rem;
    }

    .leaflet-container {
      font-family: inherit;
      background: #e8e8e8;
    }

    .leaflet-div-icon.route-pin-icon {
      background: transparent !important;
      border: none !important;
    }

    .route-pin-icon span {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border: 2px solid #000;
      border-radius: 50%;
      background: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .leaflet-div-icon.zh-map-label-wrap {
      background: transparent !important;
      border: none !important;
    }

    .zh-map-label {
      display: block;
      transform: translate(-50%, -50%);
      font-size: 11px;
      font-weight: 700;
      color: #111;
      letter-spacing: 0.03em;
      white-space: nowrap;
      pointer-events: none;
      text-shadow:
        -1px -1px 0 #fff,
        1px -1px 0 #fff,
        -1px 1px 0 #fff,
        1px 1px 0 #fff,
        0 0 6px #fff;
    }

    @media (max-width: 600px) {
      .zh-map-label { font-size: 10px; }
    }

    .panel {
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
    }

    .panel h2 {
      margin: 0 0 0.65rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding-bottom: 0.45rem;
    }

    .region-empty {
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      opacity: 0.65;
    }

    .region-detail { display: none; }
    .region-detail.visible { display: block; }

    .region-icon {
      font-size: 2rem;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .region-names {
      font-size: 0.95rem;
      margin-bottom: 0.35rem;
      font-weight: 500;
    }

    .region-names .sub {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      margin-top: 0.2rem;
    }

    .region-acts {
      margin: 0.75rem 0 0;
      padding: 0;
      list-style: none;
    }

    .region-acts li {
      font-size: 0.82rem;
      padding: 0.35rem 0;
      border-top: 1px solid #ccc;
      letter-spacing: 0.05em;
    }

    .btn {
      display: inline-block;
      margin-top: 0.85rem;
      padding: 0.5rem 1rem;
      border: 1px solid rgba(0, 0, 0, 0.55);
      background: rgba(255, 255, 255, 0.5);
      color: #000;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      border-radius: 10px;
    }

    .btn:hover { background: rgba(0, 0, 0, 0.85); color: #fff; border-color: transparent; }

    .btn-block { width: 100%; text-align: center; }

    .btn-outline {
      background: transparent;
      color: #111;
      border: 1px solid rgba(0, 0, 0, 0.28);
    }

    .btn-outline:hover {
      background: rgba(0, 0, 0, 0.06);
      color: #111;
      border-color: rgba(0, 0, 0, 0.4);
    }

    .route-panel .hint {
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      opacity: 0.7;
      margin: 0 0 0.65rem;
      line-height: 1.45;
    }

    .route-form label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }

    .route-form input {
      width: 100%;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.5rem;
      border: 1px solid rgba(0, 0, 0, 0.2);
      margin-bottom: 0.5rem;
      letter-spacing: 0.03em;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.65);
    }

    .route-form .btn { margin-top: 0.35rem; }

    .route-status {
      min-height: 1.2em;
      font-size: 0.78rem;
      margin-top: 0.45rem;
      letter-spacing: 0.04em;
    }

    .route-status.err { color: #a40000; }

    .pin-list {
      list-style: none;
      margin: 0.75rem 0 0;
      padding: 0;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.35);
    }

    .pin-row {
      display: flex;
      align-items: flex-start;
      gap: 0.35rem;
      padding: 0.45rem 0.4rem;
      border-bottom: 1px solid #ddd;
      font-size: 0.78rem;
    }

    .pin-row:last-child { border-bottom: none; }

    .pin-row .pin-idx {
      flex-shrink: 0;
      width: 1.25rem;
      font-weight: 700;
      opacity: 0.6;
    }

    .pin-row .pin-body {
      flex: 1;
      min-width: 0;
    }

    .pin-row .pin-place {
      font-weight: 600;
      word-break: break-word;
    }

    .pin-row .pin-note {
      opacity: 0.8;
      margin-top: 0.15rem;
      word-break: break-word;
    }

    .pin-actions {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .pin-actions .icon-btn { font-size: 0.8rem; }

    .collect-panel {
      margin-top: 0;
    }

    .collect-panel .hint {
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      opacity: 0.7;
      margin: 0 0 0.65rem;
      line-height: 1.45;
    }

    .clip-form label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
      margin-top: 0.45rem;
    }

    .clip-form label:first-of-type { margin-top: 0; }

    .clip-form input,
    .clip-form textarea {
      width: 100%;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.5rem;
      border: 1px solid rgba(0, 0, 0, 0.2);
      letter-spacing: 0.03em;
      resize: vertical;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.65);
    }

    .clip-form textarea { min-height: 4.5rem; }

    .clip-list {
      list-style: none;
      margin: 1rem 0 0;
      padding: 0;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      max-height: 420px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.35);
    }

    .clip-row {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid #ddd;
      font-size: 0.86rem;
    }

    .clip-row:last-child { border-bottom: none; }

    .clip-row:hover { background: var(--track); }

    .clip-row-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .clip-title-line {
      font-weight: 700;
      letter-spacing: 0.03em;
      word-break: break-word;
      margin-bottom: 0.25rem;
    }

    .clip-title-line:empty::before {
      content: "（无标题）";
      opacity: 0.45;
      font-weight: 500;
    }

    .clip-link-line {
      margin: 0.2rem 0 0.35rem;
      word-break: break-all;
    }

    .clip-link-line a {
      color: #000;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .clip-link-line a:hover { opacity: 0.65; }

    .clip-note-line {
      font-size: 0.82rem;
      opacity: 0.88;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .clip-note-line:empty { display: none; }

    .clip-row-actions {
      display: flex;
      gap: 0.15rem;
      flex-shrink: 0;
    }

    .clip-edit-form {
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px dashed #999;
    }

    .clip-edit-form input,
    .clip-edit-form textarea {
      width: 100%;
      font-family: inherit;
      font-size: 0.82rem;
      padding: 0.35rem 0.45rem;
      border: 1px solid rgba(0, 0, 0, 0.22);
      margin-bottom: 0.4rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.75);
    }

    .clip-edit-form textarea { min-height: 3.5rem; resize: vertical; }

    .clip-edit-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .clip-edit-actions .btn { margin-top: 0; }

    .app-tabs {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 0.55rem;
    }

    .app-tab {
      flex: 1;
      padding: 0.4rem 0.55rem;
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.45);
      font-family: inherit;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
    }

    .app-tab[aria-selected="true"] {
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      border-color: transparent;
    }

    body.view-sheet-active .map-bg,
    body.view-sheet-active .map-panels,
    body.view-sheet-active .handbook-stack,
    body.view-sheet-active .site-footer {
      display: none !important;
    }

    .sheet-view {
      display: none;
      position: fixed;
      top: var(--app-chrome-h, 148px);
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 25;
      pointer-events: none;
      flex-direction: column;
      background: #eef1f4;
      padding: 10px 12px 12px;
    }

    body.view-sheet-active .sheet-view {
      display: flex;
    }

    .sheet-toolbar,
    .sheet-wrap {
      pointer-events: auto;
    }

    body.view-sheet-active .site-header {
      width: min(720px, calc(100vw - 24px)) !important;
    }

    body.view-map-active .sheet-view {
      display: none !important;
    }

    .sheet-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.55rem;
    }

    .sheet-toolbar .btn { margin-top: 0; }

    .sheet-status {
      flex: 1;
      min-width: 120px;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.72;
      text-align: right;
    }

    .sheet-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 10px;
      background: #fff;
      -webkit-overflow-scrolling: touch;
    }

    .sheet-table {
      border-collapse: collapse;
      min-width: 100%;
      font-size: 0.82rem;
    }

    .sheet-table th,
    .sheet-table td {
      border: 1px solid #d8dde3;
      padding: 0;
      min-width: 88px;
      max-width: 280px;
      vertical-align: top;
    }

    .sheet-table th.sheet-row-idx,
    .sheet-table td.sheet-row-idx {
      min-width: 36px;
      max-width: 36px;
      text-align: center;
      background: #f4f6f8;
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(0, 0, 0, 0.45);
      position: sticky;
      left: 0;
      z-index: 2;
    }

    .sheet-table thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: #f8f9fb;
    }

    .sheet-table thead th.sheet-row-idx {
      z-index: 4;
    }

    .sheet-table input,
    .sheet-cell-editor,
    .sheet-cell-caption {
      display: block;
      width: 100%;
      min-width: 80px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: inherit;
      padding: 0.4rem 0.45rem;
      letter-spacing: 0.02em;
    }

    .sheet-cell-editor {
      min-height: 2.6em;
      resize: vertical;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.45;
      field-sizing: content;
    }

    .sheet-cell-caption {
      min-height: 1.6em;
      resize: vertical;
      font-size: 0.72rem;
      opacity: 0.85;
      white-space: pre-wrap;
      border-top: 1px dashed #ddd;
    }

    .sheet-cell-image {
      padding: 0.35rem;
    }

    .sheet-cell-image img {
      display: block;
      max-width: 100%;
      max-height: 180px;
      width: auto;
      height: auto;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
    }

    .sheet-cell-image .sheet-img-clear {
      margin-top: 0.25rem;
      padding: 0.15rem 0.35rem;
      font-size: 0.62rem;
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      font-family: inherit;
    }

    .sheet-table input:focus,
    .sheet-cell-editor:focus,
    .sheet-cell-caption:focus {
      outline: 2px solid rgba(0, 0, 0, 0.35);
      outline-offset: -2px;
      background: #fffef8;
    }

    .sheet-table tr:hover td:not(.sheet-row-idx) {
      background: rgba(0, 0, 0, 0.02);
    }

    .sheet-del-row {
      min-width: 28px;
      max-width: 28px;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 0.75rem;
      opacity: 0.45;
    }

    .sheet-del-row:hover { opacity: 1; }
  </style>
</head>
<body class="view-map-active">
  <div class="map-bg">
    <div id="map" role="application" aria-label="日本地图"></div>
    <div id="map-fallback" class="map-fallback-msg" aria-live="polite"></div>
  </div>

  <div class="ui-layer">
    <header class="glass-card site-header" style="width: min(520px, calc(100vw - 24px))">
      <nav class="app-tabs" role="tablist" aria-label="页面切换">
        <button type="button" class="app-tab" role="tab" id="tab-map" data-view="map" aria-selected="true">🗺️ 地图</button>
        <button type="button" class="app-tab" role="tab" id="tab-sheet" data-view="sheet" aria-selected="false">📊 共享表格</button>
      </nav>
      <h1>2026夏季旅行✈️ 🇯🇵</h1>
      <p class="tagline" id="view-tagline">地图全屏背景 · 侧栏资料与路线</p>
      <p class="cloud-status" id="cloud-status">仅本机缓存（未配置云端）</p>
    </header>

    <aside class="map-panels" aria-label="地图上的浮层面板">
      <div class="glass-card panel" id="region-panel">
        <h2>地点信息</h2>
        <p class="region-empty" id="region-empty">在地图上点击高亮区域查看详情。</p>
        <div class="region-detail" id="region-detail">
          <div class="region-icon" id="region-icon"></div>
          <div class="region-names" id="region-names"></div>
          <ul class="region-acts" id="region-acts"></ul>
          <button type="button" class="btn btn-block" id="btn-add-suggested">加入旅行计划</button>
        </div>
      </div>

      <div class="glass-card panel route-panel">
        <h2>路线标记</h2>
        <p class="hint">填写时间与地点后点「添加新点」。与共享表格的日期/时间/地点/备注列自动同步。</p>
        <div class="route-form">
          <label for="route-time">时间</label>
          <input type="text" id="route-time" maxlength="40" placeholder="例：7/10 或 7月10日 14:00" autocomplete="off" />
          <label for="route-place">地点</label>
          <input type="text" id="route-place" maxlength="120" placeholder="例：京都站 / 大阪城公园 / 渋谷" autocomplete="off" />

      function formatPinNote(item) {
        var t = (item.time || "").trim();

        return t || n;

      function parsePinNote(note) {
        var s = (note || "").trim();
        var i = s.indexOf(TIME_NOTE_SEP);
        if (i >= 0) {
          return { time: s.slice(0, i).trim(), note: s.slice(i + TIME_NOTE_SEP.length).trim() };
        }
        return { time: "", note: s };
      }

      function normalizeItinerary(arr) {
        if (!Array.isArray(arr)) return [];
        return arr
          .map(function (x) {
            if (!x || typeof x !== "object") return null;
            var lat = typeof x.lat === "number" && !isNaN(x.lat) ? x.lat : null;
            var lng = typeof x.lng === "number" && !isNaN(x.lng) ? x.lng : null;
            if (lat === null || lng === null) {
              lat = null;
              lng = null;
            }
            return {
              id: typeof x.id === "string" ? x.id : uid(),
              time: typeof x.time === "string" ? x.time.slice(0, 40) : "",
              place: typeof x.place === "string" ? x.place.slice(0, 120) : "",
              note: typeof x.note === "string" ? x.note.slice(0, 200) : "",
              lat: lat,
              lng: lng
            };
          })
          .filter(Boolean);
      }

            return "";
          }));
        }
        return { headers: headers, rows: rows };
      }

      function normalizeSheet(s) {
        if (!s || typeof s !== "object") return defaultSheet();
        var headers = Array.isArray(s.headers)
          ? s.headers.map(function (h) {
              return String(h || "").slice(0, 40);
            })
          : DEFAULT_SHEET_HEADERS.slice();
        if (headers.length < 2) headers = DEFAULT_SHEET_HEADERS.slice();
        var colCount = headers.length;
        var rows = Array.isArray(s.rows)
          ? s.rows.map(function (row) {
              var r = Array.isArray(row)
                ? row.map(function (cell) {
                    return normalizeCellStorage(cell);
                  })
                : [];
              while (r.length < colCount) r.push("");
              return r.slice(0, colCount);
            })
          : [];
        while (rows.length < 12) {
          rows.push(
            headers.map(function () {
              return "";
            })
          );
        }
        return { headers: headers, rows: rows };

        if (!o || typeof o !== "object") {
          return {

        var itinerary = normalizeItinerary(o.itinerary);

            return {

              time: parsed.time,
              place: p.place || "",
              note: parsed.note,
              lat: p.lat,
              lng: p.lng
            };
          });
        }
        if (!itinerary.length) itinerary = defaultItineraryFromTemplate();
        return {
          itinerary: itinerary,
          infoClippings: normalizeInfoClippings(o.infoClippings),
          sheet: normalizeSheet(o.sheet)

      function sbHeaders(jsonBody) {
        var h = {
          apikey: SUPABASE_ANON_KEY,

      function sbGetJSON(path) {
        var root = getSupabaseRestRoot();
        return fetch(root + "/" + path, {
          headers: sbHeaders(false)
        }).then(function (r) {
          if (!r.ok) return Promise.reject(new Error("GET " + path + " " + r.status));
          return r.json();
        });

      function sbPostJSON(path, rows, merge) {
        var root = getSupabaseRestRoot();
        var headers = sbHeaders(true);
        if (merge) headers["Prefer"] = "resolution=merge-duplicates";
        return fetch(root + "/" + path, {
          method: "POST",
          headers: headers,
          body: JSON.stringify(rows)
        }).then(function (r) {
          if (r.ok) return;
          return r.text().then(function (body) {
            var err = new Error("POST " + path + " " + r.status);
            err.status = r.status;
            err.body = body || "";
            return Promise.reject(err);
          });
        });
      }

      function sheetCloudErrorHint(err) {
        var body = (err && err.body) || "";
        if (
          (err && err.status === 404) ||
          body.indexOf("shared_sheet") !== -1 ||
          body.indexOf("PGRST205") !== -1
        ) {
          return "同步失败：Supabase 未创建 shared_sheet 表，请在 SQL Editor 运行 supabase-setup.sql";
        }
        if (err && err.status === 413) {
          return "同步失败：表格数据过大（含图片时请减少图片或先仅本机保存）";
        }
        return "同步失败";
      }

      async function probeSheetCloudTable() {
        try {
          await sbGetJSON("shared_sheet?select=id&limit=1");
          return true;
        } catch (e) {
          return false;
        }
      }

      function sbDeleteEq(table, id) {
        var root = getSupabaseRestRoot();
        return fetch(root + "/" + table + "?id=eq." + encodeURIComponent(id), {
          method: "DELETE",
          headers: sbHeaders(false)
        }).then(function (r) {
          if (!r.ok) return Promise.reject(new Error("DELETE " + table + " " + r.status));
        });
      }

      function sbPatchEq(table, id, patch) {
        var root = getSupabaseRestRoot();
        return fetch(root + "/" + table + "?id=eq." + encodeURIComponent(id), {
          method: "PATCH",
          headers: sbHeaders(true),
          body: JSON.stringify(patch)
        }).then(function (r) {
          if (!r.ok) return Promise.reject(new Error("PATCH " + table + " " + r.status));
        });
      }

      async function cloudRemoteHasAnyRow() {
        var m = await sbGetJSON("map_pins?select=id&limit=1");
        if (m.length) return true;
        var c = await sbGetJSON("info_clippings?select=id&limit=1");
        if (c.length) return true;
        var s = await sbGetJSON("shared_sheet?select=id&limit=1");
        return s.length > 0;
      }

      async function cloudPullApply() {
        var pins = await sbGetJSON("map_pins?select=*&order=sort_order.asc");
        var clips = await sbGetJSON("info_clippings?select=*&order=updated_at.desc");
        cloudApplying = true;
        try {
          if (!routeEditing) {
            var localNoCoords = state.itinerary.filter(function (it) {
              return !itineraryHasCoords(it);
            });
            state.itinerary = pins.map(function (p) {
              var parsed = parsePinNote(p.note);
              return {
                id: p.id,
                time: parsed.time,
                place: p.place,
                note: parsed.note,
                lat: p.lat,
                lng: p.lng
              };
            });
            if (localNoCoords.length) {
              state.itinerary = state.itinerary.concat(localNoCoords);
            }
          }
          state.infoClippings = clips.map(function (c) {
            return {
              id: c.id,
              title: c.title || "",
              url: c.url || "",
              note: c.note || ""
            };
          });
          if (!sheetEditing) {
            try {
              var sheets = await sbGetJSON("shared_sheet?select=*&id=eq." + encodeURIComponent(SHEET_ID));
              if (sheets.length) {
                var localRows = state.sheet.rows;
                var pulled = normalizeSheet({
                  headers: sheets[0].headers,
                  rows: sheets[0].rows
                });
                pulled.rows = mergeSheetRowsFromCloud(pulled.rows, localRows);
                state.sheet = pulled;
              }
            } catch (eSheet) {
              console.warn("表格云端拉取失败", eSheet);
            }
          }
          if (!routeEditing && !sheetEditing) {
            syncItineraryToSheet({ silent: true, skipSave: true });
          }
        } finally {
          cloudApplying = false;
        }
      }

      async function cloudSeedFromCurrentState() {
        var mapped = getMappedItinerary();
        if (mapped.length) {
          var mrows = mapped.map(function (p, i) {
            return {
              id: p.id,
              place: p.place,
              note: formatPinNote(p),
              lat: p.lat,
              lng: p.lng,
              sort_order: i
            };
          });
          await sbPostJSON("map_pins", mrows, true);
        }
        if (state.infoClippings.length) {
          var crows = state.infoClippings.map(function (c) {
            return {
              id: c.id,
              title: c.title || "",
              url: c.url || "",
              note: c.note || ""
            };
          });
          await sbPostJSON("info_clippings", crows, true);
        }
        try {
          await cloudPushSheet(true);
        } catch (eSheet) {
          console.warn("表格初始上传失败", eSheet);
        }
      }

      function prepareSheetRowsForCloud(rows) {
        return rows.map(function (row) {
          return row.map(function (cell) {
            if (isSheetImageCell(cell)) {
              return { img: "", cap: cell.cap || "", _img: true };
            }
            return cell;
          });
        });
      }

      function mergeSheetRowsFromCloud(remoteRows, localRows) {
        var out = remoteRows.map(function (row, ri) {
          return row.map(function (cell, ci) {
            if (cell && typeof cell === "object" && cell._img && localRows[ri] && isSheetImageCell(localRows[ri][ci])) {
              return localRows[ri][ci];
            }
            return cell;
          });
        });
        return out;
      }

      function cloudPushSheet(force) {
        if (!cloudEnabled || cloudApplying) return Promise.resolve();
        if (!sheetCloudAvailable) return Promise.resolve();
        if (!force && sheetEditing) return Promise.resolve();
        var payload = {
          id: SHEET_ID,
          headers: state.sheet.headers,
          rows: state.sheet.rows
        };
        return sbPostJSON("shared_sheet?on_conflict=id", [payload], true).catch(function (err) {
          if (err && err.status === 413) {
            return sbPostJSON(
              "shared_sheet?on_conflict=id",
              [
                {
                  id: SHEET_ID,
                  headers: state.sheet.headers,
                  rows: prepareSheetRowsForCloud(state.sheet.rows)
                }
              ],
              true
            );
          }
          return Promise.reject(err);
        });
      }

      function scheduleSheetSave() {
        if (sheetSaveTimer) clearTimeout(sheetSaveTimer);
        setSheetStatus("保存中…");
        sheetSaveTimer = setTimeout(function () {
          sheetSaveTimer = null;
          saveState();
          if (cloudEnabled && !cloudApplying) {
            if (!sheetCloudAvailable) {
              setSheetStatus("已保存到本机（需在 Supabase 运行 supabase-setup.sql 创建 shared_sheet 表）");
              return;
            }
            cloudPushSheet(false)
              .then(function () {
                var hasImg = state.sheet.rows.some(function (row) {
                  return row.some(isSheetImageCell);
                });
                setSheetStatus(hasImg ? "已同步（图片主要保存在本机）" : "已同步");
              })
              .catch(function (err) {
                setSheetStatus(sheetCloudErrorHint(err));
              });
          } else {
            setSheetStatus("已保存到本机");
          }
        }, 500);
      }

      async function cloudSyncAllPinSortOrder() {
        if (!cloudEnabled || cloudApplying) return;
        var mapped = getMappedItinerary();
        for (var i = 0; i < mapped.length; i++) {
          await sbPatchEq("map_pins", mapped[i].id, { sort_order: i });
        }
      }

      function cloudPushItineraryItem(item, sortOrder) {
        if (!cloudEnabled || cloudApplying || !itineraryHasCoords(item)) return Promise.resolve();
        return sbPostJSON(
          "map_pins",
          [
            {
              id: item.id,
              place: item.place,
              note: formatPinNote(item),
              lat: item.lat,
              lng: item.lng,
              sort_order: sortOrder
            }
          ],
          true
        );
      }

      function cloudPatchItineraryItem(item, sortOrder) {
        if (!cloudEnabled || cloudApplying || !itineraryHasCoords(item)) return Promise.resolve();
        return sbPatchEq("map_pins", item.id, {
          place: item.place,
          note: formatPinNote(item),
          lat: item.lat,
          lng: item.lng,
          sort_order: sortOrder
        });
      }

      async function cloudPollTick() {
        if (!cloudEnabled || cloudApplying) return;
        try {
          await cloudPullApply();
          syncItineraryUi();
          renderInfoClippings();
          if (!sheetEditing) renderSheet();
          saveState();
        } catch (e) {
          console.warn("云端拉取失败", e);
        }
      }

      function isCloudConfigured() {
        var u = (SUPABASE_URL || "").trim();
        var k = (SUPABASE_ANON_KEY || "").trim();
        if (!u || !k) return false;
        if (u.indexOf("__INJECT_") !== -1 || k.indexOf("__INJECT_") !== -1) return false;
        return true;
      }

      async function initCloudIfConfigured() {
        if (!isCloudConfigured()) {
          setCloudStatus("仅本机缓存（未配置云端）", false);
          setFooterCloudNote("本机 localStorage · 配置 Supabase 后多人共享");
          return;
        }
        cloudEnabled = true;
        setCloudStatus("正在连接 Supabase…", true);
        try {
          sheetCloudAvailable = await probeSheetCloudTable();
          var has = await cloudRemoteHasAnyRow();
          if (has) {
            await cloudPullApply();
          } else {
            await cloudSeedFromCurrentState();
          }
          saveState();
          if (sheetCloudAvailable) {
            setCloudStatus("云端已连接 · 约每 12 秒同步他人更新", true);
            setFooterCloudNote("行程 / 路线 / 收集夹 / 共享表格已与 Supabase 同步（匿名可写，注意滥用风险）");
          } else {
            setCloudStatus("云端已连接（表格未建表，仅本机保存表格）", true);
            setFooterCloudNote("路线/收集夹已同步 · 表格需在 Supabase 运行 supabase-setup.sql 后共享");
          }
          if (!sheetCloudAvailable) {
            setSheetStatus("表格仅本机保存：请在 Supabase SQL Editor 运行 supabase-setup.sql");
          }
          setInterval(cloudPollTick, 12000);
        } catch (e) {
          cloudEnabled = false;
          console.error(e);
          setCloudStatus("云端连接失败（仅本机）", false);
          setFooterCloudNote("云端不可用 · 本机 localStorage 备份");
        }
      }

      function escapeHtml(s) {
        var d = document.createElement("div");
        d.textContent = s == null ? "" : String(s);
        return d.innerHTML;
      }

      function normalizeHttpUrl(raw) {
        raw = (raw || "").trim();
        if (!raw) return "";
        var s = raw;
        if (!/^https?:\/\//i.test(s)) s = "https://" + s;
        try {
          var u = new URL(s);
          if (u.protocol !== "http:" && u.protocol !== "https:") return "";
          return u.href;
        } catch (e) {
          return "";
        }
      }

      function renderInfoClippings() {
        var ul = document.getElementById("clip-list");
        if (!ul) return;
        ul.innerHTML = "";
        if (!state.infoClippings.length) {
          var empty = document.createElement("li");
          empty.className = "clip-row";
          empty.style.opacity = "0.55";
          empty.textContent = "暂无条目，使用上方表单添加。";
          ul.appendChild(empty);
          return;
        }
        state.infoClippings.forEach(function (clip) {
          var li = document.createElement("li");
          li.className = "clip-row";

          if (editingClipId === clip.id) {
            var form = document.createElement("div");
            form.className = "clip-edit-form";
            var inTitle = document.createElement("input");
            inTitle.type = "text";
            inTitle.value = clip.title;
            inTitle.placeholder = "标题";
            var inUrl = document.createElement("input");
            inUrl.type = "text";
            inUrl.value = clip.url;
            inUrl.placeholder = "https://…";
            var inNote = document.createElement("textarea");
            inNote.value = clip.note;
            inNote.placeholder = "信息 / 摘录";
            var bar = document.createElement("div");
            bar.className = "clip-edit-actions";
            var save = document.createElement("button");
            save.type = "button";
            save.className = "btn";
            save.textContent = "保存";
            save.addEventListener("click", function () {
              var nt = inTitle.value.trim();
              var nu = inUrl.value.trim();
              var nn = inNote.value.trim();
              var href = nu ? normalizeHttpUrl(nu) : "";
              if (nu && !href) {
                window.alert("链接格式无效，请检查或留空。");
                return;
              }
              if (!nt && !href && !nn) {
                window.alert("标题、链接、备注至少填一项。");
                return;
              }
              clip.title = nt;
              clip.url = href;
              clip.note = nn;
              editingClipId = null;
              saveState();
              renderInfoClippings();
              if (cloudEnabled && !cloudApplying) {
                sbPatchEq("info_clippings", clip.id, {
                  title: nt,
                  url: href,
                  note: nn
                }).catch(function (e) {
                  console.warn(e);
                });
              }
            });
            var cancel = document.createElement("button");
            cancel.type = "button";
            cancel.className = "btn";
            cancel.textContent = "取消";
            cancel.addEventListener("click", function () {
              editingClipId = null;
              renderInfoClippings();
            });
            bar.appendChild(save);
            bar.appendChild(cancel);
            form.appendChild(inTitle);
            form.appendChild(inUrl);
            form.appendChild(inNote);
            form.appendChild(bar);
            li.appendChild(form);
            ul.appendChild(li);
            return;
          }

          var head = document.createElement("div");
          head.className = "clip-row-head";
          var main = document.createElement("div");
          main.style.minWidth = "0";
          main.style.flex = "1";
          var titleEl = document.createElement("div");
          titleEl.className = "clip-title-line";
          titleEl.textContent = clip.title.trim();
          main.appendChild(titleEl);
          if (clip.url) {
            var linkWrap = document.createElement("div");
            linkWrap.className = "clip-link-line";
            var a = document.createElement("a");
            a.href = clip.url;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.textContent = clip.url;
            linkWrap.appendChild(a);
            main.appendChild(linkWrap);
          }
          if (clip.note && clip.note.trim()) {
            var noteEl = document.createElement("div");
            noteEl.className = "clip-note-line";
            noteEl.textContent = clip.note;
            main.appendChild(noteEl);
          }
          var acts = document.createElement("div");
          acts.className = "clip-row-actions";
          var ed = document.createElement("button");
          ed.type = "button";
          ed.className = "icon-btn";
          ed.setAttribute("aria-label", "编辑");
          ed.textContent = "✏️";
          ed.addEventListener("click", function () {
            editingClipId = clip.id;
            renderInfoClippings();
          });
          var del = document.createElement("button");
          del.type = "button";
          del.className = "icon-btn";
          del.setAttribute("aria-label", "删除");
          del.textContent = "🗑️";
          del.addEventListener("click", function () {
            if (editingClipId === clip.id) editingClipId = null;
            state.infoClippings = state.infoClippings.filter(function (c) {
              return c.id !== clip.id;
            });
            saveState();
            renderInfoClippings();
            if (cloudEnabled && !cloudApplying) {
              sbDeleteEq("info_clippings", clip.id).catch(function (e) {
                console.warn(e);
              });
            }
          });
          acts.appendChild(ed);
          acts.appendChild(del);
          head.appendChild(main);
          head.appendChild(acts);
          li.appendChild(head);
          ul.appendChild(li);
        });
      }

      function addInfoClipFromForm() {
        var title = document.getElementById("clip-title-input").value.trim();
        var urlRaw = document.getElementById("clip-url-input").value.trim();
        var note = document.getElementById("clip-note-input").value.trim();
        var url = urlRaw ? normalizeHttpUrl(urlRaw) : "";
        if (urlRaw && !url) {
          window.alert("链接格式无效，请修正或删除链接。");
          return;
        }
        if (!title && !url && !note) {
          window.alert("请至少填写标题、链接或信息中的一项。");
          return;
        }
        var clipId = uid();
        state.infoClippings.unshift({
          id: clipId,
          title: title,
          url: url,
          note: note
        });
        saveState();
        if (cloudEnabled && !cloudApplying) {
          sbPostJSON(
            "info_clippings",
            [{ id: clipId, title: title, url: url, note: note }],
            true
          ).catch(function (e) {
            console.warn(e);
          });
        }
        document.getElementById("clip-title-input").value = "";
        document.getElementById("clip-url-input").value = "";
        document.getElementById("clip-note-input").value = "";
        renderInfoClippings();
      }

      function setRouteStatus(msg, isErr) {
        var el = document.getElementById("route-status");
        el.textContent = msg || "";
        el.classList.toggle("err", !!isErr);
      }

      function ensureRouteTopPane() {
        if (!map || map.getPane("routeTopPane")) return;
        map.createPane("routeTopPane");
        map.getPane("routeTopPane").style.zIndex = 650;
      }

      function finishMapUiSetup() {
        if (!map) return;
        if (map.zoomControl) {
          map.zoomControl.setPosition("bottomright");
        }
        setTimeout(function () {
          if (map) map.invalidateSize();
        }, 150);
      }

      window.addEventListener("resize", function () {
        if (map) map.invalidateSize();
      });

      function ensureRouteGroup() {
        if (!map) return;
        ensureRouteTopPane();
        if (!routeLayerGroup) {
          routeLayerGroup = L.layerGroup().addTo(map);
        }
      }

      function refreshRouteOnMap() {
        if (!map) return;
        ensureRouteGroup();
        routeLayerGroup.clearLayers();
        routeMarkersById = {};
        var mapped = getMappedItinerary();
        if (mapped.length >= 2) {
          var latlngs = mapped.map(function (p) {
            return [p.lat, p.lng];
          });
          L.polyline(latlngs, {
            pane: "routeTopPane",
            color: "#000",
            weight: 2.5,
            opacity: 0.9,
            lineJoin: "round",
            lineCap: "round"
          }).addTo(routeLayerGroup);
        }
        mapped.forEach(function (p, i) {
          var icon = L.divIcon({
            className: "route-pin-icon",
            html: "<span>" + (i + 1) + "</span>",
            iconSize: [26, 26],
            iconAnchor: [13, 13]
          });
          var marker = L.marker([p.lat, p.lng], { icon: icon, pane: "routeTopPane" });
          var title = (p.time ? p.time + " · " : "") + p.place;
          marker.bindPopup(
            "<strong>" +
              escapeHtml((i + 1) + ". " + title) +
              "</strong><br>" +
              escapeHtml(p.note || "")
          );
          marker.on("click", function () {
            selectItinerary(p.id, { pan: false });
          });
          marker.addTo(routeLayerGroup);
          routeMarkersById[p.id] = marker;
        });
        if (activeItineraryId && routeMarkersById[activeItineraryId]) {
          routeMarkersById[activeItineraryId].setZIndexOffset(1000);
        }
      }

      function renderPinList() {
        var ul = document.getElementById("pin-list");
        ul.innerHTML = "";
        if (!state.itinerary.length) {
          var empty = document.createElement("li");
          empty.className = "pin-row";
          empty.style.opacity = "0.55";
          empty.textContent = "暂无行程，请在上方表单添加。";
          ul.appendChild(empty);
          return;
        }
        state.itinerary.forEach(function (p, idx) {
          var li = document.createElement("li");
          li.className = "pin-row" + (p.id === activeItineraryId ? " is-active" : "");
          var idxEl = document.createElement("span");
          idxEl.className = "pin-idx";
          idxEl.textContent = idx + 1;
          var body = document.createElement("div");
          body.className = "pin-body";
          if (p.time) {
            var tm = document.createElement("div");
            tm.className = "pin-time";
            tm.textContent = p.time;
            body.appendChild(tm);
          }
          var pl = document.createElement("div");
          pl.className = "pin-place";
          pl.textContent = p.place || "（未填地点）";
          var nt = document.createElement("div");
          nt.className = "pin-note";
          nt.textContent = p.note || (itineraryHasCoords(p) ? "—" : "尚未定位到地图");
          body.appendChild(pl);
          body.appendChild(nt);
          var actions = document.createElement("div");
          actions.className = "pin-actions";
          var geo = document.createElement("button");
          geo.type = "button";
          geo.className = "icon-btn";
          geo.setAttribute("aria-label", "定位");
          geo.textContent = "📍";
          geo.addEventListener("click", function (e) {
            e.stopPropagation();
            selectItinerary(p.id);
            geocodeItineraryById(p.id, true);
          });
          var up = document.createElement("button");
          up.type = "button";
          up.className = "icon-btn";
          up.setAttribute("aria-label", "上移");
          up.textContent = "↑";
          up.disabled = idx === 0;
          up.addEventListener("click", function (e) {
            e.stopPropagation();
            moveItinerary(idx, -1);
          });
          var down = document.createElement("button");
          down.type = "button";
          down.className = "icon-btn";
          down.setAttribute("aria-label", "下移");
          down.textContent = "↓";
          down.disabled = idx === state.itinerary.length - 1;
          down.addEventListener("click", function (e) {
            e.stopPropagation();
            moveItinerary(idx, 1);
          });
          var del = document.createElement("button");
          del.type = "button";
          del.className = "icon-btn";
          del.setAttribute("aria-label", "删除");
          del.textContent = "🗑️";
          del.addEventListener("click", function (e) {
            e.stopPropagation();
            removeItinerary(p.id);
          });
          actions.appendChild(geo);
          actions.appendChild(up);
          actions.appendChild(down);
          actions.appendChild(del);
          li.appendChild(idxEl);
          li.appendChild(body);
          li.appendChild(actions);
          li.addEventListener("click", function () {
            selectItinerary(p.id);
          });
          ul.appendChild(li);
        });
      }

      function moveItinerary(index, delta) {
        var j = index + delta;
        if (j < 0 || j >= state.itinerary.length) return;
        var t = state.itinerary[index];
        state.itinerary[index] = state.itinerary[j];
        state.itinerary[j] = t;
        saveState();
        syncItineraryUi();
        syncItineraryToSheet({ silent: true });
        if (cloudEnabled && !cloudApplying) {
          cloudSyncAllPinSortOrder().catch(function (e) {
            console.warn(e);
          });
        }
      }

      function removeItinerary(id) {
        state.itinerary = state.itinerary.filter(function (p) {
          return p.id !== id;
        });
        if (activeItineraryId === id) activeItineraryId = null;
        saveState();
        syncItineraryUi();
        syncItineraryToSheet({ silent: true });
        if (cloudEnabled && !cloudApplying) {
          sbDeleteEq("map_pins", id)
            .then(function () {
              return cloudSyncAllPinSortOrder();
            })
            .catch(function (e) {
              console.warn(e);
            });
        }
      }

      function updateItineraryField(id, field, value) {
        var item = getItineraryItem(id);
        if (!item) return;
        if (field === "time") item.time = (value || "").trim().slice(0, 40);
        else if (field === "place") item.place = (value || "").trim().slice(0, 120);
        else if (field === "note") item.note = (value || "").trim().slice(0, 200);
        saveState();
        scheduleItineraryToSheetSync();
        if (cloudEnabled && !cloudApplying && itineraryHasCoords(item)) {
          var sortOrder = getMappedItinerary().findIndex(function (x) {
            return x.id === id;
          });
          cloudPatchItineraryItem(item, sortOrder >= 0 ? sortOrder : 0).catch(function (e) {
            console.warn(e);
          });
        }
      }

      function geocodeItineraryById(id, showStatus) {
        var item = getItineraryItem(id);
        if (!item || !(item.place || "").trim()) {
          if (showStatus) setRouteStatus("请先填写地点。", true);
          return Promise.resolve(false);
        }
        if (showStatus) setRouteStatus("正在搜索地点…", false);
        return geocodeJapan(item.place.trim())
          .then(function (arr) {
            if (!arr || !arr.length) {
              if (showStatus) setRouteStatus("未找到该地点，请换更具体的名称。", true);
              return false;
            }
            var hit = arr[0];
            var lat = parseFloat(hit.lat);
            var lng = parseFloat(hit.lon);
            if (isNaN(lat) || isNaN(lng)) {
              if (showStatus) setRouteStatus("坐标无效，请重试。", true);
              return false;
            }
            item.lat = lat;
            item.lng = lng;
            saveState();
            syncItineraryUi();
            syncItineraryToSheet({ silent: true });
            if (cloudEnabled && !cloudApplying) {
              var sortOrder = getMappedItinerary().findIndex(function (x) {
                return x.id === id;
              });
              cloudPushItineraryItem(item, sortOrder >= 0 ? sortOrder : getMappedItinerary().length - 1).catch(
                function (e) {
                  console.warn(e);
                }
              );
            }
            if (showStatus) setRouteStatus("已定位：" + item.place, false);
            if (activeItineraryId === id) panToItineraryItem(item);
            return true;
          })
          .catch(function () {
            if (showStatus) setRouteStatus("检索失败（网络或限流）。请稍后再试。", true);
            return false;
          });
      }

      function addItineraryItem(time, place, note, lat, lng) {
        var item = {
          id: uid(),
          time: (time || "").trim().slice(0, 40),
          place: (place || "").trim().slice(0, 120),
          note: (note || "").trim().slice(0, 200),
          lat: lat,
          lng: lng
        };
        if (isNaN(item.lat) || isNaN(item.lng)) {
          item.lat = null;
          item.lng = null;
        }
        state.itinerary.push(item);
        saveState();
        syncItineraryUi();
        syncItineraryToSheet({ silent: true });
        if (cloudEnabled && !cloudApplying && itineraryHasCoords(item)) {
          cloudPushItineraryItem(item, getMappedItinerary().length - 1).catch(function (e) {
            console.warn(e);
          });
        }
        return item;
      }

      var SHEET_TEXT_MAX = 4000;

      function isSheetImageCell(v) {
        return !!(v && typeof v === "object" && typeof v.img === "string" && v.img.indexOf("data:image") === 0);
      }

      function normalizeCellStorage(raw) {
        if (isSheetImageCell(raw)) {
          return {
            img: String(raw.img).slice(0, SHEET_IMG_MAX),
            cap: String(raw.cap || "").slice(0, SHEET_TEXT_MAX)
          };
        }
        if (raw && typeof raw === "object" && raw._img) {
          return {
            img: "",
            cap: String(raw.cap || "").slice(0, SHEET_TEXT_MAX),
            _img: true
          };
        }
        if (raw && typeof raw === "object" && raw.img) {
          return { img: String(raw.img).slice(0, SHEET_IMG_MAX), cap: "" };
        }
        if (typeof raw === "string" && raw.indexOf("__IMG__:") === 0) {
          return { img: raw.slice(7).slice(0, SHEET_IMG_MAX), cap: "" };
        }
        return String(raw == null ? "" : raw).slice(0, SHEET_TEXT_MAX);
      }

      function compressImageBlob(file, done) {
        var reader = new FileReader();
        reader.onload = function () {
          var url = reader.result;
          var img = new Image();
          img.onload = function () {
            var maxW = 960;
            var scale = Math.min(1, maxW / img.width);
            var w = Math.max(1, Math.round(img.width * scale));
            var h = Math.max(1, Math.round(img.height * scale));
            var canvas = document.createElement("canvas");
            canvas.width = w;
            canvas.height = h;
            var ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);
            try {
              done(canvas.toDataURL("image/jpeg", 0.85));
            } catch (e) {
              done(url);
            }
          };
          img.onerror = function () {
            done(url);
          };
          img.src = url;
        };
        reader.onerror = function () {
          done(null);
        };
        reader.readAsDataURL(file);
      }

      function pasteImageIntoCell(r, c, file) {
        if (!file || !file.type || file.type.indexOf("image") === -1) return;
        setSheetStatus("正在处理图片…");
        compressImageBlob(file, function (dataUrl) {
          if (!dataUrl) {
            setSheetStatus("图片读取失败");
            return;
          }
          setSheetCellImage(r, c, dataUrl, "");
          saveState();
          renderSheet();
          setSheetStatus("已粘贴图片");
          var cell = document.querySelector(
            '#sheet-tbody [data-row="' + r + '"][data-col="' + c + '"]'
          );
          if (cell) cell.focus();
        });
      }

      function handleSheetCellPaste(e, r, c) {
        var dt = e.clipboardData;
        if (!dt) return false;
        var items = dt.items;
        if (items) {
          for (var i = 0; i < items.length; i++) {
            if (items[i].type && items[i].type.indexOf("image") !== -1) {
              e.preventDefault();
              var file = items[i].getAsFile();
              if (file) pasteImageIntoCell(r, c, file);
              return true;
            }
          }
        }
        if (dt.files && dt.files.length) {
          for (var j = 0; j < dt.files.length; j++) {
            if (dt.files[j].type && dt.files[j].type.indexOf("image") !== -1) {
              e.preventDefault();
              pasteImageIntoCell(r, c, dt.files[j]);
              return true;
            }
          }
        }
        var html = dt.getData("text/html");
        if (html) {
          var m = html.match(/<img[^>]+src=["'](data:image\/[^"']+)["']/i);
          if (m && m[1]) {
            e.preventDefault();
            setSheetCellImage(r, c, m[1], "");
            renderSheet();
            setSheetStatus("已粘贴图片");
            return true;
          }
        }
        return false;
      }

      function mountSheetCell(td, ri, ci, raw) {
        td.innerHTML = "";
        td.className = "";

        if (isSheetImageCell(raw)) {
          td.className = "sheet-cell-has-image";
          var wrap = document.createElement("div");
          wrap.className = "sheet-cell-image";

          var img = document.createElement("img");
          img.src = raw.img;
          img.alt = raw.cap || "单元格图片";

          var cap = document.createElement("textarea");
          cap.className = "sheet-cell-caption";
          cap.placeholder = "图片说明（可换行）…";
          cap.value = raw.cap || "";
          cap.dataset.row = String(ri);
          cap.dataset.col = String(ci);
          cap.addEventListener("focus", function () {
            sheetEditing = true;
          });
          cap.addEventListener("blur", function () {
            sheetEditing = false;
            if (isSheetImageCell(state.sheet.rows[ri][ci])) {
              state.sheet.rows[ri][ci].cap = cap.value.slice(0, SHEET_TEXT_MAX);
              scheduleSheetSave();
            }
          });
          cap.addEventListener("input", function () {
            if (isSheetImageCell(state.sheet.rows[ri][ci])) {
              state.sheet.rows[ri][ci].cap = cap.value.slice(0, SHEET_TEXT_MAX);
              scheduleSheetSave();
            }
          });
          cap.addEventListener("paste", function (e) {
            if (handleSheetCellPaste(e, ri, ci)) return;
          });
          cap.addEventListener("keydown", function (e) {
            handleSheetCellKeydown(e, ri, ci);
          });

          var clearBtn = document.createElement("button");
          clearBtn.type = "button";
          clearBtn.className = "sheet-img-clear";
          clearBtn.textContent = "移除图片";
          clearBtn.addEventListener("click", function () {
            setSheetCell(ri, ci, cap.value || "");
            renderSheet();
          });

          wrap.appendChild(img);
          wrap.appendChild(cap);
          wrap.appendChild(clearBtn);
          td.appendChild(wrap);
          return;
        }

        var ta = document.createElement("textarea");
        ta.className = "sheet-cell-editor";
        ta.value = getCellPlainText(raw);
        
        ta.dataset.row = String(ri);
        ta.dataset.col = String(ci);
        ta.addEventListener("focus", function () {
          sheetEditing = true;
        });
        ta.addEventListener("blur", function () {
          sheetEditing = false;
          if (isSheetImageCell(state.sheet.rows[ri][ci])) return;
          setSheetCell(ri, ci, ta.value, { skipRouteSync: true });
          if (isSheetRouteColumn(ci)) {
            syncSheetRowToItinerary(ri, { geocode: true });
          }
        });
        ta.addEventListener("input", function () {
          if (isSheetImageCell(state.sheet.rows[ri][ci])) return;
          setSheetCell(ri, ci, ta.value, { skipRouteSync: true });
        });
        ta.addEventListener("paste", function (e) {
          if (handleSheetCellPaste(e, ri, ci)) return;
        });
        ta.addEventListener("keydown", function (e) {
          handleSheetCellKeydown(e, ri, ci);
        });
        td.appendChild(ta);
      }

      function renderSheet() {
        var thead = document.getElementById("sheet-thead");
        var tbody = document.getElementById("sheet-tbody");
        if (!thead || !tbody) return;
        ensureSheetDimensions();

        var headRow = document.createElement("tr");
        var corner = document.createElement("th");
        corner.className = "sheet-row-idx";
        corner.textContent = "#";
        headRow.appendChild(corner);

        state.sheet.headers.forEach(function (h, ci) {
          var th = document.createElement("th");
          var inp = document.createElement("input");
          inp.type = "text";
          inp.value = h;
          inp.setAttribute("aria-label", "列标题 " + (ci + 1));
          inp.dataset.col = String(ci);
          inp.addEventListener("focus", function () {
            sheetEditing = true;
          });
          inp.addEventListener("blur", function () {
            sheetEditing = false;
            state.sheet.headers[ci] = inp.value.slice(0, 40);
            scheduleSheetSave();
          });
          inp.addEventListener("input", function () {
            state.sheet.headers[ci] = inp.value.slice(0, 40);
            scheduleSheetSave();
          });
          th.appendChild(inp);
          headRow.appendChild(th);
        });
        var delHead = document.createElement("th");
        delHead.className = "sheet-row-idx";
        delHead.setAttribute("aria-hidden", "true");
        headRow.appendChild(delHead);
        thead.innerHTML = "";
        thead.appendChild(headRow);

        tbody.innerHTML = "";
        state.sheet.rows.forEach(function (row, ri) {
          var tr = document.createElement("tr");
          var idx = document.createElement("td");
          idx.className = "sheet-row-idx";
          idx.textContent = String(ri + 1);
          tr.appendChild(idx);

          state.sheet.headers.forEach(function (_h, ci) {
            var td = document.createElement("td");
            mountSheetCell(td, ri, ci, row[ci]);
            tr.appendChild(td);
          });

          var delTd = document.createElement("td");
          var delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "sheet-del-row";
          delBtn.setAttribute("aria-label", "删除第 " + (ri + 1) + " 行");
          delBtn.textContent = "×";
          delBtn.addEventListener("click", function () {
            state.sheet.rows.splice(ri, 1);
            if (!state.sheet.rows.length) {
              state.sheet.rows.push(
                state.sheet.headers.map(function () {
                  return "";
                })
              );
            }
            renderSheet();
            scheduleSheetSave();
          });
          delTd.appendChild(delBtn);
          tr.appendChild(delTd);

          tbody.appendChild(tr);
        });
      }

      function focusSheetCell(r, c) {
        var next = document.querySelector(
          '#sheet-tbody [data-row="' + r + '"][data-col="' + c + '"]'
        );
        if (next) next.focus();
      }

      function handleSheetCellKeydown(e, r, c) {
        if (e.key === "Tab") {
          e.preventDefault();
          var nc = e.shiftKey ? c - 1 : c + 1;
          var nr = r;
          if (nc >= state.sheet.headers.length) {
            nc = 0;
            nr = r + 1;
          }
          if (nc < 0) {
            nc = state.sheet.headers.length - 1;
            nr = r - 1;
          }
          if (nr < 0 || nr >= state.sheet.rows.length) return;
          if (nc < 0 || nc >= state.sheet.headers.length) return;
          focusSheetCell(nr, nc);
          return;
        }
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          var nr = r + 1;
          if (nr >= state.sheet.rows.length) return;
          focusSheetCell(nr, c);
        }
      }

      function applyPasteToSheet(startR, startC, text) {
        var lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
        if (lines.length && lines[lines.length - 1] === "") lines.pop();
        var touchedRows = {};
        lines.forEach(function (line, dr) {
          var cells = line.split("\t");
          var r = startR + dr;
          while (r >= state.sheet.rows.length) {
            state.sheet.rows.push(
              state.sheet.headers.map(function () {
                return "";
              })
            );
          }
          cells.forEach(function (val, dc) {
            var c = startC + dc;
            if (c >= state.sheet.headers.length) return;
            setSheetCell(r, c, val.replace(/\r/g, ""), { skipRouteSync: true });
            if (isSheetRouteColumn(c)) touchedRows[r] = true;
          });
        });
        Object.keys(touchedRows).forEach(function (rk) {
          syncSheetRowToItinerary(parseInt(rk, 10), { geocode: false });
        });
        renderSheet();
        scheduleSheetSave();
      }

      function cellToExport(v) {
        if (isSheetImageCell(v)) {
          return "[图片]" + (v.cap ? " " + v.cap.replace(/\s+/g, " ") : "");
        }
        return String(v == null ? "" : v).replace(/\t/g, " ").replace(/\n/g, " ↵ ");
      }

      function sheetToTsv() {
        ensureSheetDimensions();
        var lines = [state.sheet.headers.join("\t")];
        state.sheet.rows.forEach(function (row) {
          lines.push(
            row
              .map(function (cell) {
                return cellToExport(cell);
              })
              .join("\t")
          );
        });
        return lines.join("\n");
      }

      function getSheetColumnMap() {
        var h = state.sheet.headers;
        return {
          date: h.indexOf("日期"),
          time: h.indexOf("时间"),
          place: h.indexOf("地点"),
          act: h.indexOf("活动"),
          note: h.indexOf("备注")
        };
      }

      function isSheetRouteColumn(colIndex) {
        var cols = getSheetColumnMap();
        return (
          colIndex === cols.date ||
          colIndex === cols.time ||
          colIndex === cols.place ||
          colIndex === cols.act ||
          colIndex === cols.note
        );
      }

      function applyItineraryItemToSheetRow(item, rowIndex) {
        var cols = getSheetColumnMap();
        var h = state.sheet.headers;
        while (rowIndex >= state.sheet.rows.length) {
          state.sheet.rows.push(
            h.map(function () {
              return "";
            })
          );
        }
        var row = state.sheet.rows[rowIndex];
        var timeStr = item.time || "";
        if (cols.time >= 0) row[cols.time] = timeStr;
        if (cols.place >= 0) row[cols.place] = item.place || "";
        if (cols.note >= 0) row[cols.note] = item.note || "";
        if (cols.act >= 0) row[cols.act] = item.note || "";
        if (cols.date >= 0 && timeStr && timeStr.indexOf("/") !== -1) {
          row[cols.date] = timeStr.split(/\s+/)[0];
        } else if (cols.date >= 0 && !timeStr) {
          row[cols.date] = "";
        }
      }

      function scheduleItineraryToSheetSync() {
        if (itinerarySheetSyncTimer) clearTimeout(itinerarySheetSyncTimer);
        itinerarySheetSyncTimer = setTimeout(function () {
          itinerarySheetSyncTimer = null;
          syncItineraryToSheet({ silent: true });
        }, 350);
      }

      function syncItineraryToSheet(opts) {
        opts = opts || {};
        if (itinerarySheetSyncing || sheetEditing) return;
        itinerarySheetSyncing = true;
        try {
          state.itinerary.forEach(function (item, i) {
            applyItineraryItemToSheetRow(item, i);
          });
          if (!opts.skipRender && activeView === "sheet") renderSheet();
          if (!opts.skipSave && !cloudApplying) scheduleSheetSave();
        } finally {
          itinerarySheetSyncing = false;
        }
      }

      function syncSheetRowToItinerary(rowIndex, opts) {
        opts = opts || {};
        if (itinerarySheetSyncing) return;
        var cols = getSheetColumnMap();
        if (cols.time < 0 && cols.place < 0 && cols.note < 0) return;

        ensureSheetDimensions();
        var row = state.sheet.rows[rowIndex];
        if (!row) return;

        var timeVal = cols.time >= 0 ? getCellPlainText(row[cols.time]).trim() : "";
        var dateVal = cols.date >= 0 ? getCellPlainText(row[cols.date]).trim() : "";
        var time = timeVal;
        if (dateVal) time = dateVal + (timeVal ? " " + timeVal : "");
        var place = cols.place >= 0 ? getCellPlainText(row[cols.place]).trim() : "";
        var note = cols.note >= 0 ? getCellPlainText(row[cols.note]).trim() : "";
        if (!note && cols.act >= 0) note = getCellPlainText(row[cols.act]).trim();

        itinerarySheetSyncing = true;
        var item;
        var prevPlace = "";
        try {
          while (state.itinerary.length <= rowIndex) {
            state.itinerary.push({
              id: uid(),
              time: "",
              place: "",
              note: "",
              lat: null,
              lng: null
            });
          }
          item = state.itinerary[rowIndex];
          prevPlace = (item.place || "").trim();
          item.time = time.slice(0, 40);
          item.place = place.slice(0, 120);
          item.note = note.slice(0, 200);
          saveState();
        } finally {
          itinerarySheetSyncing = false;
        }

        syncItineraryUi();
        if (opts.geocode && place && place !== prevPlace && item) {
          geocodeItineraryById(item.id, false);
        }
      }

      function importItineraryToSheet() {
        syncItineraryToSheet({ silent: false });
        setSheetStatus("已同步 " + state.itinerary.length + " 个路线点到表格");
      }

      function initAppTabs() {
        document.querySelectorAll(".app-tab").forEach(function (tab) {
          tab.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            setActiveView(tab.getAttribute("data-view"));
          });
        });

        document.getElementById("goto-sheet-btn").addEventListener("click", function () {
          setActiveView("sheet");
        });

        document.getElementById("sheet-goto-map").addEventListener("click", function () {
          setActiveView("map");
        });

        document.getElementById("sheet-add-row").addEventListener("click", function () {
          state.sheet.rows.push(
            state.sheet.headers.map(function () {
              return "";
            })
          );
          renderSheet();
          scheduleSheetSave();
        });

        document.getElementById("sheet-add-col").addEventListener("click", function () {
          var name = "列" + (state.sheet.headers.length + 1);
          state.sheet.headers.push(name);
          state.sheet.rows.forEach(function (row) {
            row.push("");
          });
          renderSheet();
          scheduleSheetSave();
        });

        document.getElementById("sheet-import-route").addEventListener("click", importItineraryToSheet);

        document.getElementById("sheet-export-tsv").addEventListener("click", function () {
          var tsv = sheetToTsv();
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(tsv).then(
              function () {
                setSheetStatus("已复制到剪贴板，可粘贴到 Excel");
              },
              function () {
                setSheetStatus("复制失败，请手动选择表格内容");
              }
            );
          } else {
            setSheetStatus("请手动全选表格后复制");
          }
        });

        var wrap = document.getElementById("sheet-wrap");
        wrap.addEventListener("paste", function (e) {
          var active = document.activeElement;
          if (!active || active.dataset.row == null) return;
          var r = parseInt(active.dataset.row, 10);
          var c = parseInt(active.dataset.col, 10);
          if (handleSheetCellPaste(e, r, c)) return;

          var dt = e.clipboardData || window.clipboardData;
          if (!dt) return;
          var text = dt.getData("text");
          if (!text) return;
          if (text.indexOf("\t") === -1 && text.indexOf("\n") === -1) return;
          e.preventDefault();
          applyPasteToSheet(r, c, text);
        });
      }

      async function start() {
        initAppTabs();
        bindRouteFormEditing();
        syncHeaderOffset();
        window.addEventListener("resize", syncHeaderOffset);
        await initCloudIfConfigured();
        renderSheet();
        syncItineraryUi();
        syncItineraryToSheet({ silent: true, skipSave: true });
        renderInfoClippings();

        if (!window.L) {
          showFallbackMessage("Leaflet 未能加载，请检查网络后刷新。");
          return;
        }

        if (useRemote) {
          fetch(REMOTE_GEOJSON, { mode: "cors" })
            .then(function (r) {
              if (!r.ok) throw new Error("http");
              return r.json();
            })
            .then(function (data) {
              var filtered = filterRemote(data);
              if (!filtered.features.length) throw new Error("empty");
              initMapWithData(filtered);
            })
            .catch(function () {
              try {
                initMapWithData(EMBEDDED_GEOJSON);
              } catch (e2) {
                initFallbackCircles();
              }
            });
        } else {
          initMapWithData(EMBEDDED_GEOJSON);
        }
      }

      start().catch(function (err) {
        console.error(err);
      });
    })();
  </script>
</body>
